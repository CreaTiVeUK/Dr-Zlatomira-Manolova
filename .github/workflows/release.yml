name: Release

# Gate releases on the CI workflow: only cut a version once CI has passed on
# main. (Release commits are tagged [skip ci], so they never re-trigger CI or
# this workflow — no release loop.)
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write # to be able to publish a GitHub release
  issues: write # to be able to comment on released issues
  pull-requests: write # to be able to comment on released pull requests
  id-token: write # to enable use of OIDC for npm provenance

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # required for semantic-release to check commit history
          persist-credentials: false # required for semantic-release/git (we use a token)

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Verify Tests
        run: npm test -- --run

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
