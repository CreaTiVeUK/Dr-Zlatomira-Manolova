version: '3.8'

services:
  app:
    container_name: zlati-pediatrics-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - db

  db:
    container_name: zlati-pediatrics-db
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env.local
    environment:
      - POSTGRES_DB=zlati_pediatrics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: zlati-pediatrics-elastic
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data

  grafana:
    image: grafana/grafana:latest
    container_name: zlati-pediatrics-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - elasticsearch

  backup:
    container_name: zlati-pediatrics-backup
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env.local
    environment:
      - POSTGRES_DB=zlati_pediatrics
      - POSTGRES_HOST=db
    volumes:
      - ./scripts:/scripts
      - backups:/backups
    depends_on:
      - db
    command: sh -c "chmod +x /scripts/backup.sh && while true; do /scripts/backup.sh; sleep 86400; done"

volumes:
  postgres_data:
  elastic_data:
  backups:
